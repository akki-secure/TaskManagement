name: Feature Request
description: 新機能や改善を提案する
title: "feat: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        **注意:** `docs/requirements.md` を確認して、すでに計画済みでないか確認してからリクエストを送信してください。

  - type: textarea
    id: problem
    attributes:
      label: 課題・動機
      description: この機能が解決する問題は何ですか？なぜ必要ですか？
      placeholder: "現状、ユーザーは...ができないため、..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能を、どのように動作させたいですか？
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 影響範囲
      options:
        - フロントエンド (React/Vite)
        - バックエンド (Spring Boot API)
        - データベーススキーマ
        - Docker / インフラ
        - ドキュメント
        - その他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - 高 — コア機能をブロックしている
        - 中 — ユーザビリティの改善
        - 低 — あると良い
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: この機能が完成したとみなせる検証可能な条件を列挙してください。
      placeholder: |
        - [ ] ユーザーがカードに期限日を設定できる
        - [ ] 期限日はDBに永続化される
        - [ ] 期限切れのカードが赤くハイライトされる

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討したアプローチと、この案を選んだ理由

  - type: checkboxes
    id: checklist
    attributes:
      label: 確認事項
      options:
        - label: docs/requirements.md を確認し、未計画の機能であることを確認した
          required: true
        - label: 既存イシューを検索し、重複でないことを確認した
          required: true
